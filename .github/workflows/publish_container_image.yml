name: Build and push precision medicine portal container image
on:
  push:
    tags:
      - 'v*.*.*'
jobs:
  build_push_container:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION="$(node -p "require('./next-app/package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "package.json version: $PKG_VERSION"
          echo "git tag:              $GITHUB_REF_NAME (-> $TAG_VERSION)"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Release tag '$GITHUB_REF_NAME' does not match package.json version '$PKG_VERSION'. Bump next-app/package.json or retag."
            exit 1
          fi
      - name: Run docker/setup-qemu-action
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4
      - name: Run docker/setup-buildx-action
        id: buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - name: List available platforms
        run: echo ${{ steps.buildx.outputs.platforms }}
      - name: Run docker/login-action
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Run docker/metadata-action
        id: metadata_action_id
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ghcr.io/ScilifelabDataCentre/precision-medicine-portal
          flavor: |
            latest=auto
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
          labels: |
            org.opencontainers.image.title=precision-medicine-portal
            org.opencontainers.image.description=precision medicine web portal frontend
            org.opencontainers.image.url=${{ github.event.repository.html_url }}
            org.opencontainers.image.source=${{ github.event.repository.html_url }}
      - name: Build and push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          push: true
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.metadata_action_id.outputs.tags }}
          labels: ${{ steps.metadata_action_id.outputs.labels }}
