# Pa11y: A tool to check accessibility issues on a webpage
# The config file and sitemap file used by this workflow
# are in the ".github" directory of the repository
#
# This runs against a local instance of the app
---
name: Pa11y Accessibility Check

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  pa11y:
    name: Pa11y Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repo
        uses: actions/checkout@v6

      - name: Set up Node.js 26
        uses: actions/setup-node@v6
        with:
          node-version: 26

      - name: Install dependencies
        run: npm install

      - name: Install Pa11y CI and wait-on
        run: npm install -g pa11y-ci wait-on

      - name: Start app and wait until ready
        run: |
          npm run dev &
          npx wait-on http://127.0.0.1:3000

      - name: Run Pa11y CI
        run: |
          pa11y-ci \
            --config ${GITHUB_WORKSPACE}/.github/pa11y.config \
            --level warning